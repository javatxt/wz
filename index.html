<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>javatnt的小站</title>
    <style>
        /* 全局重置 & 字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'PingFang SC', 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #2c241e;
            user-select: none;
        }

        /* 白色动态背景画布 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
            background: #ffffff;
        }

        /* 主卡片 — 干净、透亮、白底微玻璃 */
        .glass-card {
            position: relative;
            z-index: 10;
            max-width: 520px;
            width: 92%;
            padding: 2.4rem 1.6rem 2.8rem;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px) saturate(180%);
            -webkit-backdrop-filter: blur(8px) saturate(180%);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease, box-shadow 0.4s ease;
            animation: float-in 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            transform: scale(1.005);
            box-shadow: 0 28px 48px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.03);
        }

        /* 头像 — QQ头像 3982537603 */
        .avatar-wrapper {
            margin-bottom: 1.6rem;
        }

        .avatar {
            width: 104px;
            height: 104px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.04), 0 0 0 2px rgba(255, 215, 150, 0.2);
            border: 2px solid #ffffff;
            transition: all 0.25s ease;
            background: #f5f0eb;
            display: inline-block;
        }

        .avatar:hover {
            transform: scale(1.02) rotate(2deg);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.06);
            border-color: #f5dcc8;
        }

        /* 标题 — 纯文字，无图标 */
        .title {
            font-size: 2.8rem;
            font-weight: 400;
            letter-spacing: 8px;
            margin-top: 0.1rem;
            margin-bottom: 0.9rem;
            color: #3d2f26;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }

        /* 签名 — 纯文字，无图标 */
        .motto {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            background: rgba(245, 235, 225, 0.3);
            padding: 0.7rem 1.6rem;
            border-radius: 48px;
            display: inline-block;
            border: 1px solid rgba(0, 0, 0, 0.03);
            color: #4d3d32;
            margin-bottom: 2rem;
            box-shadow: inset 0 1px 4px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(2px);
        }

        /* 音乐按钮 — 干净，无多余装饰 */
        .music-link {
            display: inline-block;
            background: rgba(245, 235, 225, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 0, 0, 0.04);
            padding: 1rem 3.2rem;
            border-radius: 80px;
            font-size: 1.5rem;
            font-weight: 350;
            color: #3d2f26;
            text-decoration: none;
            letter-spacing: 4px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
            transition: all 0.25s ease;
            margin-top: 0.4rem;
        }

        .music-link:hover {
            background: rgba(235, 220, 210, 0.4);
            border-color: rgba(0, 0, 0, 0.06);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.03);
            color: #241e19;
        }

        .music-link:active {
            transform: scale(0.97);
        }

        /* 底部小字 — 极简 */
        .brand-tag {
            margin-top: 2.2rem;
            font-size: 0.7rem;
            letter-spacing: 6px;
            opacity: 0.3;
            color: #7a6a5c;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            padding-top: 1.4rem;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
        }

        /* 入场动画 */
        @keyframes float-in {
            0% {
                opacity: 0;
                transform: translateY(28px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 响应式 — 全设备适配 */
        @media (max-width: 480px) {
            .glass-card {
                padding: 1.8rem 1.2rem 2.2rem;
                border-radius: 36px;
                width: 94%;
            }
            .title {
                font-size: 2.4rem;
                letter-spacing: 6px;
            }
            .avatar {
                width: 88px;
                height: 88px;
            }
            .motto {
                font-size: 1rem;
                padding: 0.5rem 1.2rem;
                letter-spacing: 1px;
            }
            .music-link {
                font-size: 1.3rem;
                padding: 0.8rem 2.2rem;
                letter-spacing: 3px;
            }
            .brand-tag {
                width: 70%;
                font-size: 0.6rem;
                letter-spacing: 4px;
            }
        }

        @media (max-width: 380px) {
            .title {
                font-size: 2.0rem;
                letter-spacing: 4px;
            }
            .motto {
                font-size: 0.9rem;
            }
            .music-link {
                font-size: 1.1rem;
                padding: 0.6rem 1.6rem;
            }
            .avatar {
                width: 76px;
                height: 76px;
            }
        }

        /* 横屏/大屏 优化 */
        @media (min-width: 768px) {
            .glass-card {
                padding: 3rem 2.4rem 3.2rem;
                max-width: 560px;
            }
            .title {
                font-size: 3.2rem;
                letter-spacing: 10px;
            }
            .avatar {
                width: 120px;
                height: 120px;
            }
            .motto {
                font-size: 1.3rem;
                padding: 0.8rem 2rem;
            }
            .music-link {
                font-size: 1.7rem;
                padding: 1.1rem 3.6rem;
            }
        }

        /* 辅助 */
        .text-shadow {
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.02);
        }

        #bg-canvas {
            pointer-events: none;
        }

        .glass-card a, .glass-card .avatar {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <!-- 白色动态背景画布 -->
    <canvas id="bg-canvas"></canvas>

    <!-- 主卡片 — 完全无图案干扰，纯文字 -->
    <div class="glass-card">
        <!-- 头像 -->
        <div class="avatar-wrapper">
            <img 
                class="avatar" 
                src="https://q1.qlogo.cn/g?b=qq&nk=3982537603&s=640" 
                alt="QQ头像 3982537603"
                loading="lazy"
                onerror="this.src='https://q1.qlogo.cn/g?b=qq&nk=3982537603&s=100';"
            >
        </div>

        <!-- 标题：蜂蜜柚子（无图标） -->
        <div class="title">蜂蜜柚子</div>

        <!-- 签名：累了，不想再折腾这些东西了（无图标） -->
        <div class="motto">累了，不想再折腾这些东西了</div>

        <!-- 免费音乐链接 -->
        <a href="https://nyj.cc.cd/" target="_blank" rel="noopener noreferrer" class="music-link">
            免费音乐
        </a>

        <!-- 底部极简标识 -->
        <div class="brand-tag">· 非诚勿扰 ·</div>
    </div>

    <script>
        (function() {
            "use strict";

            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            let particles = [];
            // 更少粒子，更安静
            const PARTICLE_COUNT = 80;
            const MAX_SPEED = 0.12;

            // 纯粹白底上的极淡暖灰粒子
            const palette = [
                'rgba(220, 210, 200, 0.15)',
                'rgba(210, 200, 190, 0.12)',
                'rgba(230, 220, 212, 0.18)',
                'rgba(200, 190, 180, 0.10)',
                'rgba(240, 232, 224, 0.14)',
                'rgba(215, 205, 195, 0.10)'
            ];

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 2.8 + 0.8,
                        vx: (Math.random() - 0.5) * MAX_SPEED * 0.6,
                        vy: (Math.random() - 0.5) * MAX_SPEED * 0.6,
                        color: palette[Math.floor(Math.random() * palette.length)],
                        alpha: Math.random() * 0.3 + 0.08,
                        pulse: Math.random() * Math.PI * 2,
                        pulseSpeed: 0.006 + Math.random() * 0.008
                    });
                }
            }

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
            }

            // 极淡固定点 — 几乎不可见，增加层次
            let fixedDots = [];

            function generateFixedDots() {
                fixedDots = [];
                for (let i = 0; i < 30; i++) {
                    fixedDots.push({
                        x: (i * 127.1 + 43) % width,
                        y: (i * 83.7 + 27) % height,
                        size: 0.4 + (i % 4) * 0.3,
                        phase: i * 1.3,
                        baseAlpha: 0.06 + (i % 5) * 0.01
                    });
                }
            }

            function drawBackground() {
                ctx.clearRect(0, 0, width, height);

                // 纯白底 (干净)
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, width, height);

                // 极淡的微光晕 (几乎看不出来，增加空气感)
                const gradient = ctx.createRadialGradient(
                    width * 0.5, height * 0.4, 60,
                    width * 0.5, height * 0.6, width * 0.8
                );
                gradient.addColorStop(0, 'rgba(245, 240, 235, 0.08)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);

                // 固定极淡点 (呼吸极其缓慢)
                const time = Date.now() * 0.0004;
                fixedDots.forEach(dot => {
                    const alpha = dot.baseAlpha * (0.6 + 0.4 * Math.sin(time + dot.phase));
                    ctx.beginPath();
                    ctx.arc(dot.x, dot.y, dot.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200, 190, 180, ${alpha})`;
                    ctx.fill();
                });

                // 动态粒子 — 极舒缓
                particles.forEach(p => {
                    p.pulse += p.pulseSpeed;
                    const alphaFactor = 0.5 + 0.5 * Math.sin(p.pulse);
                    const currentAlpha = p.alpha * alphaFactor;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * (0.8 + 0.2 * Math.sin(p.pulse * 0.4)), 0, Math.PI * 2);
                    ctx.fillStyle = p.color.replace('0.15', currentAlpha).replace('0.12', currentAlpha)
                        .replace('0.18', currentAlpha).replace('0.10', currentAlpha)
                        .replace('0.14', currentAlpha);
                    ctx.fill();

                    // 极淡光晕 (几乎无)
                    if (p.radius > 2.0) {
                        ctx.shadowColor = 'rgba(180, 170, 160, 0.02)';
                        ctx.shadowBlur = 10;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }

                    // 慢移
                    p.x += p.vx;
                    p.y += p.vy;

                    if (p.x < -10) p.x = width + 10;
                    if (p.x > width + 10) p.x = -10;
                    if (p.y < -10) p.y = height + 10;
                    if (p.y > height + 10) p.y = -10;

                    p.vx += (Math.random() - 0.5) * 0.003;
                    p.vy += (Math.random() - 0.5) * 0.003;
                    const speed = Math.hypot(p.vx, p.vy);
                    if (speed > MAX_SPEED * 1.2) {
                        p.vx *= 0.99;
                        p.vy *= 0.99;
                    }
                });

                requestAnimationFrame(drawBackground);
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
                generateFixedDots();
            });

            resizeCanvas();
            generateFixedDots();
            drawBackground();

            console.log('🍯 蜂蜜柚子 · 白底轻憩');
        })();
    </script>
</body>
</html>
